<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<video id="video" width="960" height="768" controls autoplay muted></video>
<script>
  var video = document.getElementById('video');
  var videoSrc = 'http://localhost:8999/stream.m3u8';
  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
  }
</script>
